name: Integration-Tests
description: |
  Runs Integrationtests using TestMachinery

on:
  push:
    branches:
      - master
      - migrate-to-gha
  workflow_dispatch:

jobs:
  integrationtest:
    runs-on: ubuntu-latest-static-ip
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: azure/setup-kubectl@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.23'
      - uses: gardener/cc-utils/.github/actions/trusted-checkout@master
      - uses: gardener/cc-utils/.github/actions/kubernetes-auth@master
        with:
          cluster-cfg: gardener/clusters/testmachinery-canary.yaml
          kubeconfig-path: /tmp/kubeconfig
          audience: garden-mcm-ci--az-ci-it
      - name: run-tests
        shell: bash
        run: |
          set -euo pipefail

          echo 'Install Ginkgo'
          go install github.com/onsi/ginkgo/v2/ginkgo
          ginkgo version

          KUBECONFIG=/tmp/kubeconfig \
          service_account_kubeconfig=/tmp/kubeconfig \
            .ci/pipeline_integration_test
